<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OMNIVERSE™ Global Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo"></script>

</head>

<body>

<div class="nav">
    <div><b>OMNIVERSE™</b></div>
    <div>
        <a href="index.html">Home</a>
        <a href="simulator.html">Simulator</a>
        <a href="ai.html">AI</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</div>

<div class="section">
    <h1>Global Intelligence Dashboard</h1>
</div>

<!-- WORLD MAP -->
<div class="section">
    <div class="card">
        <canvas id="map"></canvas>
    </div>
</div>

<!-- ANALYTICS -->
<div class="section">
    <div class="card">
        <canvas id="analytics"></canvas>
    </div>
</div>

<script>

// Dummy Country Data (upgrade later)
const data = [
    {country: "India", value: 0.75},
    {country: "USA", value: 0.85},
    {country: "China", value: 0.80},
    {country: "Germany", value: 0.78}
];

// Analytics Chart
new Chart(document.getElementById("analytics"), {
    type: "bar",
    data: {
        labels: data.map(d => d.country),
        datasets: [{
            label: "Decision Score",
            data: data.map(d => d.value)
        }]
    }
});

</script>

</body>
</html>
