<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMNIVERSE™ Global Dashboard</title>

<meta name="description" content="OMNIVERSE™ Global Intelligence Dashboard — Real-time sovereign decision analytics, ranking, and geospatial visualization">
<meta name="author" content="Dr. B. Mazumdar">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo"></script>

</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div><b>OMNIVERSE™</b></div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="papers.html">Papers</a>
        <a href="simulator.html">Simulator</a>
        <a href="ai.html">AI Demo</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</div>

<!-- HEADER -->
<div class="section fade">
    <h1>Global Intelligence Dashboard</h1>
    <p>
    Real-time sovereign decision intelligence system integrating data-driven scoring,
    comparative analytics, and geospatial visualization.
    </p>
</div>

<!-- MAP -->
<div class="section fade">
    <div class="card">
        <h2>Global Decision Map</h2>
        <canvas id="map"></canvas>
    </div>
</div>

<!-- ANALYTICS -->
<div class="section fade">
    <div class="card">
        <h2>Top 20 Decision Scores</h2>
        <canvas id="analytics"></canvas>
    </div>
</div>

<!-- RANKING -->
<div class="section fade">
    <div class="card">
        <h2>Global Ranking</h2>
        <ul id="ranking"></ul>
    </div>
</div>

<script src="script.js"></script>

<script>

// =======================================
// GLOBAL STATE
// =======================================
let globalData = [];

// =======================================
// LOAD DATA FROM BACKEND
// =======================================
async function loadData() {
    try {
        const res = await fetch("/score/all");
        const data = await res.json();

        globalData = data.slice(0, 50);

        renderRanking();
        renderChart();
        renderMap();

    } catch (err) {
        document.getElementById("ranking").innerHTML =
            "<li>Data load error</li>";
        console.error(err);
    }
}

// =======================================
// RANKING
// =======================================
function renderRanking() {
    const list = document.getElementById("ranking");
    list.innerHTML = "";

    globalData.slice(0, 20).forEach((d, i) => {
        const li = document.createElement("li");
        li.textContent = `${i + 1}. ${d.country} — ${d.score.toFixed(3)}`;
        list.appendChild(li);
    });
}

// =======================================
// BAR CHART
// =======================================
function renderChart() {
    const top = globalData.slice(0, 20);

    new Chart(document.getElementById("analytics"), {
        type: "bar",
        data: {
            labels: top.map(d => d.country),
            datasets: [{
                label: "Decision Score",
                data: top.map(d => d.score)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    min: 0,
                    max: 1
                }
            }
        }
    });
}

// =======================================
// WORLD MAP ENGINE
// =======================================
async function renderMap() {

    const response = await fetch("https://unpkg.com/world-atlas@2/countries-110m.json");
    const topology = await response.json();

    const countries = ChartGeo.topojson.feature(
        topology,
        topology.objects.countries
    ).features;

    const mapData = countries.map(country => {
        const match = globalData.find(d => d.code === country.id);

        return {
            feature: country,
            value: match ? match.score : 0
        };
    });

    new Chart(document.getElementById("map"), {
        type: "choropleth",
        data: {
            labels: countries.map(d => d.properties.name),
            datasets: [{
                label: "Decision Score",
                data: mapData
            }]
        },
        options: {
            showOutline: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                projection: {
                    axis: "x",
                    projection: "equalEarth"
                }
            }
        }
    });
}

// =======================================
// INIT
// =======================================
window.onload = loadData;

</script>

</body>
</html>
