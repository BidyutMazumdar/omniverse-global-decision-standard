<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo"></script>

</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div><b>OMNIVERSE™</b></div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>

        <a href="ai.html">AI Demo</a>

</div>

<!-- TITLE -->
<div class="section fade">
    <h1>Global Intelligence Dashboard</h1>
    <p>Country-level decision scoring, analytics, and comparative strategic intelligence</p>
</div>

<!-- WORLD MAP -->
<div class="section fade">
    <div class="card">
        <h2>World Map (Coming Next Upgrade)</h2>
        <canvas id="map"></canvas>
    </div>
</div>

<!-- ANALYTICS -->
<div class="section fade">
    <div class="card">
        <h2>Decision Score by Country</h2>
        <canvas id="analytics"></canvas>
    </div>
</div>

<!-- TOP RANKING -->
<div class="section fade">
    <div class="card">
        <h2>Top Performing Systems</h2>
        <ul id="ranking"></ul>
    </div>
</div>

<script src="script.js"></script>

<script>

// COUNTRY DATA (Upgradeable to API later)
const data = [
    {country: "India", value: 0.75},
    {country: "USA", value: 0.85},
    {country: "China", value: 0.80},
    {country: "Germany", value: 0.78}
];

// SORT RANKING
const sorted = [...data].sort((a, b) => b.value - a.value);

// DISPLAY RANKING
const rankingList = document.getElementById("ranking");
sorted.forEach((d, i) => {
    const li = document.createElement("li");
    li.innerText = `${i+1}. ${d.country} — Score: ${d.value}`;
    rankingList.appendChild(li);
});

// BAR CHART
new Chart(document.getElementById("analytics"), {
    type: "bar",
    data: {
        labels: data.map(d => d.country),
        datasets: [{
            label: "Decision Score",
            data: data.map(d => d.value)
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        }
    }
});

</script>

</body>
</html>
