<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- SEO -->
<meta name="description" content="OMNIVERSE™ Global Intelligence Dashboard — Country-Level Decision Analytics, Strategic Scoring, and Comparative System Evaluation">

<link rel="stylesheet" href="style.css">

<!-- Chart Systems -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo"></script>

</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div><b>OMNIVERSE™</b></div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="papers.html">Papers</a>

        <a href="ai.html">AI Demo</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</div>

<!-- HEADER -->
<div class="section fade">
    <h1>Global Intelligence Dashboard</h1>
    <p>
    Comparative decision analytics framework for evaluating sovereign systems 
    through structured scoring, ranking, and visual intelligence models.
    </p>
</div>

<!-- WORLD MAP -->
<div class="section fade">
    <div class="card">
        <h2>Global Decision Map</h2>
        <canvas id="map"></canvas>
    </div>
</div>

<!-- ANALYTICS -->
<div class="section fade">
    <div class="card">
        <h2>Decision Score Analytics</h2>
        <canvas id="analytics"></canvas>
    </div>
</div>

<!-- RANKING -->
<div class="section fade">
    <div class="card">
        <h2>System Ranking</h2>
        <ul id="ranking"></ul>
    </div>
</div>

<script src="script.js"></script>

<script>

// =======================================
// DATA LAYER (Structured + Expandable)
// =======================================
const dataset = [
    { country: "India", code: "IND", value: 0.75 },
    { country: "United States", code: "USA", value: 0.85 },
    { country: "China", code: "CHN", value: 0.80 },
    { country: "Germany", code: "DEU", value: 0.78 }
];

// =======================================
// RANKING ENGINE
// =======================================
const sorted = [...dataset].sort((a, b) => b.value - a.value);

const rankingList = document.getElementById("ranking");
rankingList.innerHTML = "";

sorted.forEach((d, i) => {
    const li = document.createElement("li");
    li.textContent = `${i + 1}. ${d.country} — ${d.value.toFixed(2)}`;
    rankingList.appendChild(li);
});

// =======================================
// BAR CHART (ANALYTICS)
// =======================================
new Chart(document.getElementById("analytics"), {
    type: "bar",
    data: {
        labels: dataset.map(d => d.country),
        datasets: [{
            label: "Decision Score",
            data: dataset.map(d => d.value)
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        },
        scales: {
            y: {
                min: 0,
                max: 1
            }
        }
    }
});

// =======================================
// WORLD MAP (GEO ENGINE — CLEAN BASE)
// =======================================
async function renderMap() {

    const response = await fetch("https://unpkg.com/world-atlas@2/countries-110m.json");
    const topology = await response.json();

    const countries = ChartGeo.topojson.feature(
        topology,
        topology.objects.countries
    ).features;

    const mapData = countries.map(country => {
        const match = dataset.find(d => d.code === country.id);
        return {
            feature: country,
            value: match ? match.value : 0
        };
    });

    new Chart(document.getElementById("map"), {
        type: "choropleth",
        data: {
            labels: countries.map(d => d.properties.name),
            datasets: [{
                label: "Global Decision Score",
                data: mapData
            }]
        },
        options: {
            showOutline: true,
            showGraticule: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                projection: {
                    axis: "x",
                    projection: "equalEarth"
                }
            }
        }
    });
}

// INIT MAP
renderMap();

</script>

</body>
</html>
