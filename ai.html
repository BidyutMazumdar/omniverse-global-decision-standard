<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMNIVERSE™ AI Decision Engine</title>

<meta name="description" content="OMNIVERSE™ AI Decision Engine — Strategic Evaluation of Risk, Stability, Governance, and Execution Capacity">
<meta name="author" content="Dr. B. Mazumdar">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
    <div><b>OMNIVERSE™</b></div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="papers.html">Papers</a>
        <a href="simulator.html">Simulator</a>
        <a href="ai.html">AI Demo</a>
        <a href="dashboard.html">Dashboard</a>

</div>

<div class="section fade">
    <h1>AI Decision Engine</h1>
    <p>
    A computational evaluation interface powered by OMNIVERSE™ AI,
    enabling structured analysis of systemic risk, governance strength,
    stability, and execution capacity.
    </p>
</div>

<div class="section fade">
    <div class="card">

        <label>Risk Level (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="risk">

        <label>Stability Index (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="stability">

        <label>Execution Capacity (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="capacity">

        <label>Governance Strength (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="governance">

        <button class="btn" onclick="runAI()">Run AI Evaluation</button>

        <h2 id="status">Status: Idle</h2>

    </div>
</div>

<div class="section fade">
    <div class="card">
        <h3>AI Output</h3>
        <p id="output">Awaiting evaluation...</p>
    </div>
</div>

<script>

function runAI() {

    const risk = +document.getElementById("risk").value;
    const stability = +document.getElementById("stability").value;
    const capacity = +document.getElementById("capacity").value;
    const governance = +document.getElementById("governance").value;

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    status.innerText = "Status: Processing...";
    output.innerText = "Running OMNIVERSE™ AI evaluation...";

    const score = (stability + capacity + governance - risk) / 3;

    let level, insight, color;

    if (score >= 0.8) {
        level = "AAA";
        insight = "High Stability — Sovereign-grade system with optimal governance and execution.";
        color = "🟢";
    } 
    else if (score >= 0.6) {
        level = "AA";
        insight = "Strong System — Minor optimization required in risk balancing.";
        color = "🟡";
    } 
    else if (score >= 0.4) {
        level = "BB";
        insight = "Moderate Stability — Structural improvements recommended.";
        color = "🟠";
    } 
    else {
        level = "C";
        insight = "High Risk — System instability detected. Immediate intervention required.";
        color = "🔴";
    }

    const result = `
${color} OMNIVERSE™ AI Evaluation Result

Score: ${score.toFixed(3)}
Rank: ${level}

Analysis:
${insight}
`;

    localStorage.setItem("omniverse_result", JSON.stringify({
        risk,
        stability,
        capacity,
        governance,
        score,
        rank: level,
        insight
    }));

    setTimeout(() => {
        status.innerText = "Status: Completed";
        output.innerText = result;
    }, 900);
}

</script>

</body>
</html>
