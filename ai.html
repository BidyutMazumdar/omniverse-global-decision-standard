<body>

<!-- TITLE -->
<div class="section fade">
    <h1>AI Decision Engine</h1>
    <p>
    A computational evaluation system for assessing strategic readiness 
    across risk, governance, stability, and execution capacity.
    </p>
</div>

<!-- INPUT -->
<div class="section fade">
    <div class="card">

        <label>Risk Level (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="risk">

        <label>Stability Index (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="stability">

        <label>Execution Capacity (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="capacity">

        <label>Governance Strength (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="governance">

        <h2 id="score">Score: 0.0000</h2>
        <h3 id="decision">Decision: —</h3>

    </div>
</div>

<!-- OUTPUT -->
<div class="section fade">
    <div class="card">
        <h3>System Interpretation</h3>
        <p id="analysis">Awaiting input...</p>
    </div>
</div>

<script src="script.js"></script>

<script>

// CORE DECISION ENGINE
function evaluate() {

    const r = +document.getElementById("risk").value;
    const s = +document.getElementById("stability").value;
    const c = +document.getElementById("capacity").value;
    const g = +document.getElementById("governance").value;

    // Mathematical Core
    const score = (s * c * g) * Math.exp(-r);

    document.getElementById("score").innerText = "Score: " + score.toFixed(4);

    let decision, analysis;

    // Decision Logic
    if (score > 0.75) {
        decision = "High Confidence Approval";
        analysis = "System demonstrates high resilience, strong governance, and optimal execution capability under low-risk conditions.";
    } 
    else if (score > 0.45) {
        decision = "Conditional Approval";
        analysis = "Moderate readiness detected. Strategic deployment feasible with adaptive monitoring and risk mitigation.";
    } 
    else {
        decision = "High Risk — Rejection";
        analysis = "System instability or excessive risk detected. Deployment is not recommended without structural improvement.";
    }

    document.getElementById("decision").innerText = "Decision: " + decision;
    document.getElementById("analysis").innerText = analysis;
}

// EVENT BINDING (optimized)
document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", evaluate);
});

// INITIAL LOAD
window.addEventListener("load", evaluate);

</script>

</body>
</html>
