<meta name="description" content="OMNIVERSE™ AI Decision Engine — Strategic Evaluation of Risk, Stability, Governance, and Execution Capacity">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div><b>OMNIVERSE™</b></div>

        <a href="index.html">Home</a>

<!-- TITLE -->
<div class="section fade">
    <h1>AI Decision Engine</h1>
    <p>
    A computational evaluation interface powered by OMNIVERSE™ AI,
    enabling structured analysis of systemic risk, governance strength,
    stability, and execution capacity.
    </p>
</div>

<!-- INPUT -->
<div class="section fade">
    <div class="card">

        <label>Risk Level (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="risk">

        <label>Stability Index (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="stability">

        <label>Execution Capacity (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="capacity">

        <label>Governance Strength (0 – 1)</label>
        <input type="range" min="0" max="1" step="0.01" id="governance">

        <button class="btn" onclick="runAI()">Run AI Evaluation</button>

        <h2 id="status">Status: Idle</h2>

    </div>
</div>

<!-- OUTPUT -->
<div class="section fade">
    <div class="card">
        <h3>AI Output</h3>
        <p id="output">Awaiting evaluation...</p>
    </div>
</div>

<script src="script.js"></script>

<script>

// API ENDPOINT (change if deployed)
const API_URL = "http://localhost:3000/ai";

// RUN AI
async function runAI() {

    const risk = +document.getElementById("risk").value;
    const stability = +document.getElementById("stability").value;
    const capacity = +document.getElementById("capacity").value;
    const governance = +document.getElementById("governance").value;

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    status.innerText = "Status: Processing...";
    output.innerText = "Analyzing system...";

    try {

        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                risk,
                stability,
                capacity,
                governance
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "AI request failed");
        }

        status.innerText = "Status: Completed";
        output.innerText = data.output;

    } catch (error) {

        status.innerText = "Status: Error";
        output.innerText = "Error: " + error.message;
    }
}

</script>

</body>
</html>
