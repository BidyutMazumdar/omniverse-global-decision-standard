<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OMNIVERSE™ Simulator</title>

  <meta name="description" content="OMNIVERSE™ Adoption Readiness Simulator — Quantitative Decision Modeling Platform" />
  <meta name="author" content="Dr. B. Mazumdar" />

  <meta property="og:title" content="OMNIVERSE™ Simulator" />
  <meta property="og:description" content="OMNIVERSE™ Adoption Readiness Simulator — interactive quantitative decision modeling demonstration." />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>
<body>

  <div class="nav">
    <div><b>OMNIVERSE™</b></div>
    <div>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="papers.html">Papers</a>
      <a href="simulator.html" aria-current="page">Simulator</a>
      <a href="ai.html">AI Demo</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="ranking.html">Ranking</a>
    </div>
  </div>

  <main>

    <section class="section">
      <h1>Adoption Readiness Simulator</h1>
      <p>Hybrid Decision Intelligence Model (Local + API Engine)</p>
    </section>

    <section class="section">
      <div class="card">

        <label>Cs: <span id="CsValue">0.80</span></label>
        <input type="range" min="0" max="1" step="0.01" id="Cs" value="0.80" />

        <label>Co: <span id="CoValue">0.75</span></label>
        <input type="range" min="0" max="1" step="0.01" id="Co" value="0.75" />

        <label>Io: <span id="IoValue">0.70</span></label>
        <input type="range" min="0" max="1" step="0.01" id="Io" value="0.70" />

        <label>Rs: <span id="RsValue">0.85</span></label>
        <input type="range" min="0" max="1" step="0.01" id="Rs" value="0.85" />

        <label>σ: <span id="sigmaValue">0.30</span></label>
        <input type="range" min="0" max="1" step="0.01" id="sigma" value="0.30" />

        <h2 id="result">Ad = 0.0000</h2>

        <button id="runSim">Run Advanced Simulation</button>

        <p style="margin-top:10px;">
          Ad = (Cs × Co × Io × Rs) × e<sup>-σ</sup>
        </p>

      </div>
    </section>

    <section class="section">
      <div class="card">
        <h2>Volatility Sensitivity</h2>
        <canvas id="chart"></canvas>
        <p id="chartFallback" style="display:none;">Chart unavailable</p>
      </div>
    </section>

  </main>

<script>
"use strict";

function byId(id){ return document.getElementById(id); }

function safeNum(v){ const n = Number(v); return Number.isFinite(n) ? n : 0; }

function clamp(v,min,max){ return Math.min(Math.max(v,min),max); }

function getInputs(){
  return {
    Cs: clamp(safeNum(byId("Cs")?.value),0,1),
    Co: clamp(safeNum(byId("Co")?.value),0,1),
    Io: clamp(safeNum(byId("Io")?.value),0,1),
    Rs: clamp(safeNum(byId("Rs")?.value),0,1),
    sigma: clamp(safeNum(byId("sigma")?.value),0,1)
  };
}

function updateDisplay(i){
  byId("CsValue").textContent=i.Cs.toFixed(2);
  byId("CoValue").textContent=i.Co.toFixed(2);
  byId("IoValue").textContent=i.Io.toFixed(2);
  byId("RsValue").textContent=i.Rs.toFixed(2);
  byId("sigmaValue").textContent=i.sigma.toFixed(2);
}

function calculate(Cs,Co,Io,Rs,sigma){
  return (Cs*Co*Io*Rs)*Math.exp(-sigma);
}

let chart=null;

function initChart(){
  const canvas = byId("chart");
  const fallback = byId("chartFallback");

  if (!canvas || typeof Chart === "undefined") {
    if (fallback) fallback.style.display="block";
    return;
  }

  const ctx = canvas.getContext("2d");

  chart=new Chart(ctx,{
    type:"line",
    data:{labels:[],datasets:[{label:"Ad vs σ",data:[],borderWidth:2}]},
    options:{responsive:true,scales:{y:{beginAtZero:true,max:1}}}
  });
}

function update(){
  const i=getInputs();
  updateDisplay(i);

  const Ad=calculate(i.Cs,i.Co,i.Io,i.Rs,i.sigma);

  const result = byId("result");
  if(result) result.textContent="Ad = "+Ad.toFixed(4);

  if(!chart)return;

  const labels=[],data=[];
  for(let s=0;s<=1.0001;s+=0.05){
    const v = Number(s.toFixed(2));
    labels.push(v.toFixed(2));
    data.push(Number(calculate(i.Cs,i.Co,i.Io,i.Rs,v).toFixed(6)));
  }

  chart.data.labels=labels;
  chart.data.datasets[0].data=data;
  chart.update();
}

async function runBackend(){
  try{
    const token = localStorage.getItem("token");
    if (!token) {
      alert("Login required");
      return;
    }

    const i=getInputs();

    const res=await fetch("/simulate",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${token}`
      },
      body:JSON.stringify({
        risk:i.sigma,
        stability:i.Rs,
        execution:i.Io,
        governance:i.Co
      })
    });

    if(!res.ok) throw new Error();

    const d=await res.json();

    const result = byId("result");
    if(result){
      result.innerHTML =
        "Score: "+d.score+"<br>"+
        "Rank: "+d.rank+"<br>"+
        d.interpretation;
    }

  }catch{
    alert("Simulation Failed");
  }
}

document.addEventListener("DOMContentLoaded",()=>{
  initChart();

  ["Cs","Co","Io","Rs","sigma"].forEach(id=>{
    const el = byId(id);
    if (el){
      el.addEventListener("input",update);
      el.addEventListener("change",update);
    }
  });

  const btn = byId("runSim");
  if (btn) btn.addEventListener("click",runBackend);

  update();
});
</script>

</body>
</html>
