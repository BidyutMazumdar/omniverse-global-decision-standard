<html lang="en">
<head>
<meta charset="UTF-8">

</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div><b>OMNIVERSE™</b></div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>

</div>

<!-- TITLE -->
<div class="section fade">
    <h1>Adoption Readiness Simulator</h1>
    <p>Dynamic evaluation of system adoption based on multi-variable governance metrics.</p>
</div>

<!-- SLIDERS -->
<div class="section fade">
    <div class="card">

        <label>Cs (Certification Score)</label>
        <input type="range" min="0" max="1" step="0.01" id="Cs">

        <label>Co (Compliance Score)</label>
        <input type="range" min="0" max="1" step="0.01" id="Co">

        <label>Io (Index Score)</label>
        <input type="range" min="0" max="1" step="0.01" id="Io">

        <label>Rs (Resilience Score)</label>
        <input type="range" min="0" max="1" step="0.01" id="Rs">

        <label>σt (Volatility)</label>
        <input type="range" min="0" max="1" step="0.01" id="sigma">

        <h2 id="result">Ad = 0.0000</h2>

    </div>
</div>

<!-- GRAPH -->
<div class="section fade">
    <div class="card">
        <canvas id="chart"></canvas>
    </div>
</div>

<script src="script.js"></script>

<script>

// ===============================
// CHART INIT (SAFE)
// ===============================
const canvas = document.getElementById("chart");
let chart;

if (canvas) {
    const ctx = canvas.getContext("2d");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: [],
            datasets: [{
                label: "Ad vs σt",
                data: [],
                fill: false,
                tension: 0.3
            }]
        }
    });
}

// ===============================
// CORE MODEL
// ===============================
function calculateAd(Cs, Co, Io, Rs, sigma) {
    return (Cs * Co * Io * Rs) * Math.exp(-sigma);
}

// ===============================
// UPDATE SYSTEM
// ===============================
function update() {

    let Cs = +document.getElementById("Cs").value;
    let Co = +document.getElementById("Co").value;
    let Io = +document.getElementById("Io").value;
    let Rs = +document.getElementById("Rs").value;
    let sigma = +document.getElementById("sigma").value;

    let Ad = calculateAd(Cs, Co, Io, Rs, sigma);

    document.getElementById("result").innerText = "Ad = " + Ad.toFixed(4);

    if (!chart) return;

    let labels = [];
    let data = [];

    for (let s = 0; s <= 1; s += 0.05) {
        labels.push(s.toFixed(2));
        data.push(calculateAd(Cs, Co, Io, Rs, s));
    }

    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.update();
}

// ===============================
// EVENT LISTENERS (SAFE INIT)
// ===============================
document.addEventListener("DOMContentLoaded", () => {

    document.querySelectorAll("input").forEach(el => {
        el.addEventListener("input", update);
    });

    update(); // initial run
});

</script>

</body>
</html>
